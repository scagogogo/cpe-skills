run:
  timeout: 5m
  skip-dirs:
    - examples

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    # Ignore error checks in test files
    ignore-tests: true

issues:
  # Don't exclude default errcheck exclusions
  exclude-use-default: false
  # Maximum issues count per one linter
  max-issues-per-linter: 50
  # Maximum count of issues with the same text
  max-same-issues: 3
